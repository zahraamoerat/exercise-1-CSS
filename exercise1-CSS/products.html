<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Our Featured Products</h1>
    </header>

    <main class="product-grid">
        
        <article class="product-card">
            <img src="https://placeholder.com" alt="Product Image">
            <div class="product-info">
                <h2>Shampoo</h2>
                <p class="price">R120.00</p>
                <button class="add-btn">Add to Cart</button>
            </div>
        </article>

        
        <article class="product-card">
            <img src="https://placeholder.com" alt="Product Image">
            <div class="product-info">
                <h2>Conditioner</h2>
                <p class="price">R120.00</p>
                <button class="add-btn">Add to Cart</button>
            </div>
        </article>

        <article class="product-card">
            <img src="https://placeholder.com" alt="Product Image">
            <div class="product-info">
                <h2>Body Oil</h2>
                <p class="price">R99.99</p>
                <button class="add-btn">Add to Cart</button>
            </div>
        </article>

        
        <article class="product-card">
            <img src="https://placeholder.com" alt="Product Image">
            <div class="product-info">
                <h2>Face Cream</h2>
                <p class="price">R50.00</p>
                <button class="add-btn">Add to Cart</button>
            </div>
        </article>

        
        <article class="product-card">
            <img src="https://placeholder.com" alt="Product Image">
            <div class="product-info">
                <h2>Hair Gel</h2>
                <p class="price">R65.00</p>
                <button class="add-btn">Add to Cart</button>
            </div>
        </article>

        
        <article class="product-card">
            <img src="https://placeholder.com" alt="Product Image">
            <div class="product-info">
                <h2>Lotion</h2>
                <p class="price">R94.99</p>
                <button class="add-btn">Add to Cart</button>
            </div>
        </article>
    </main>

</body>
</html>
